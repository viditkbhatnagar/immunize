id: react-hook-missing-dep
version: 1
schema_version: 1
author: "@viditkbhatnagar"
origin: bundled
error_class: lint
languages:
  - javascript
  - typescript
description: "React useEffect or useCallback referencing a reactive value without declaring it in the dependency array."

match:
  # v0.2.0 calibration: the rule ID `react-hooks/exhaustive-deps` is extremely
  # specific and appears in every real ESLint output for this class of bug.
  # The phrase anchor covers useEffect/useCallback/useMemo and the optional
  # `React.` prefix seen when the linter qualifies the hook name. Also covers
  # the inverse "unnecessary dependency" variant, which fires from the same
  # rule and wants the same fix. See _planning/MATCHER_CALIBRATION_V020.md.
  stderr_patterns:
    - "React Hook (?:React\\.)?(?:useEffect|useCallback|useMemo) has (?:a missing|an unnecessary) dependency"
    - "react-hooks/exhaustive-deps"
  stdout_patterns: []
  error_class_hint: null
  min_confidence: 0.30

verification:
  pytest_relative_path: test_template.py
  expected_fail_without_fix: true
  expected_pass_with_fix: true
  timeout_seconds: 30
