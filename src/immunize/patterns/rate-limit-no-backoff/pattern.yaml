id: rate-limit-no-backoff
version: 1
schema_version: 1
author: "@viditkbhatnagar"
origin: bundled
error_class: rate_limit
languages:
  - python
description: "HTTP client calls an API in a loop with no backoff; the first 429 response crashes the whole script instead of retrying after a pause."

match:
  stderr_patterns:
    - "429"
    - "Too Many Requests"
    - "rate limit"
  stdout_patterns: []
  error_class_hint: rate_limit
  min_confidence: 0.70

verification:
  pytest_relative_path: test_template.py
  expected_fail_without_fix: true
  expected_pass_with_fix: true
  timeout_seconds: 30
