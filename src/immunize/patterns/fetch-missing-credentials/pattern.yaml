id: fetch-missing-credentials
version: 1
schema_version: 1
author: "@viditkbhatnagar"
origin: bundled
error_class: cors
languages:
  - javascript
  - typescript
description: "Cross-origin authenticated fetch call missing credentials: 'include'; browser drops cookies and the request is rejected by CORS."

match:
  stderr_patterns:
    - "Access-Control-Allow-Credentials"
    - "credentials"
  stdout_patterns: []
  error_class_hint: cors
  min_confidence: 0.75

verification:
  pytest_relative_path: test_template.py
  expected_fail_without_fix: true
  expected_pass_with_fix: true
  timeout_seconds: 30
